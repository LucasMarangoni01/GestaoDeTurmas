<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aula 3 - Formulario completo</title>
    <link rel="stylesheet" href="css/aula3.css">
</head>
<body>
    <h1>Formulário completo</h1>
    <form>
        <!-- Iniciado o formulário -->
        <label for="nome_usuario">Nome: </label> <br>
        <input type="text" name="nome" id="nome_usuario">

        <br><br>

        <label for=sobrenome_usuario>Sobrenome: </label> <br>
        <input type="text" name="sobrenome" id="sobrenome_usuario">

        <br><br>

        <label for="idade_usuario">Idade: </label> <br>
        <input type="number" name="idade" id="idade_usuario">

        <br><br>

        <label for="email_usuario">Email: </label> <br>
        <input type="email" name="email" id="email_usuario">

        <br><br>

        <label for="senha_usuario">Senha: </label> <br>
        <input type="password" name="senha" id="senha_usuario">

        <br><br>

        <label for="genero_usuario">Gênero: </label> <br>
        
        <input type="radio" name="genero" id=""genero_usuario>Masculino <br>
        <input type="radio" name="genero" id="genero_usuario">Feminino <br>
        <input type="radio" name="genero" id="genero_usuario">Outro <br>


        <br>


        <label for="cursos_usuario">Cursos:</label> <br>
        <input type="checkbox" name="curso" id="cursos_usuario" value="informatica">Informatica <br>
        <input type="checkbox" name="curso" id="cursos_usuario" value="mecanica">Mecânica <br>
        <input type="checkbox" name="curso" id="cursos_usuario" value="costura">Costura <br>

        <br><br>

        <label for="cidade_usuario">Cidade:</label>
        
        <select name="cidade" id="cidade_usuario">
            <option value="selecione">Selecione: </option>
            <option value="sao_paulo"> São Paulo</option>
            <option value="rio_de_janeiro"> Rio de Janeiro</option>
            <option value="belo_horizonte">Belo Horizonte</option>
        </select>

        <br><br>

        <label for="arquivo_usuario">Arquivo:</label>
        <input type="file" name="arquivo" id="arquivo_usuario">

        <br><br>

        <label for="mensagem_usuario">Mensagem:</label>
        <textarea 
        name="mensagem" 
        id="mensagem_usuario"
        cols="40"
        rows="10"
        placeholder="Escreva sua mensagem: ">
        </textarea>

        <br><br>

        <button type="submit">ENVIAR</button>

    </form>
</body>
</html>
